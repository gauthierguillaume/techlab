<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TechLab</title>
  <meta name="description" content="TechLab : hub de techs pour jeux de combat, par jeu et par personnage." />
  <link rel="stylesheet" href="./styles/00-foundation.css" />
  <link rel="stylesheet" href="./styles/10-layout-and-cards.css" />
  <link rel="stylesheet" href="./styles/20-detail-pages.css" />
  <link rel="stylesheet" href="./styles/30-combo-builder.css" />
  <link rel="stylesheet" href="./styles/90-2xko-cast.css" />
  <link rel="stylesheet" href="./styles/91-marvel-tokon-cast.css" />
  <link rel="stylesheet" href="./styles/92-avatar-vf-cast.css" />
  <link rel="stylesheet" href="./styles/93-compact-select-experiment.css" />
  <link rel="stylesheet" href="./styles/95-stable-filters-links.css" />
  <link rel="stylesheet" href="./styles/96-mobile-responsive-repair.css?v=1.0.137" />
</head>
<body>
  <div class="shell shell-no-sidebar">
    <main class="app" id="app" aria-live="polite"></main>
  </div>

  <template id="gameButtonTemplate">
    <a class="game-button">
      <span class="game-name"></span>
      <span class="game-count"></span>
    </a>
  </template>

  <template id="championCardTemplate">
    <article class="champion-card">
      <button class="champion-card-button" type="button">
        <div class="champion-art-wrap">
          <img class="champion-art" alt="" loading="lazy" />
          <div class="champion-fallback" aria-hidden="true"></div>
        </div>
      </button>
      <div class="champion-overlay">
        <a class="champion-name-link">
          <h2 class="champion-name"></h2>
        </a>
        <div class="champion-links">
          <a class="champion-tag" target="_blank" rel="noreferrer noopener"></a>
          <a class="champion-wiki-link" target="_blank" rel="noreferrer noopener">Wiki</a>
          <a class="champion-official-link" target="_blank" rel="noreferrer noopener">Officiel</a>
          <span class="health-badge" title="PV"></span>
        </div>
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./script.js?v=1.0.137"></script>
</body>
</html>
